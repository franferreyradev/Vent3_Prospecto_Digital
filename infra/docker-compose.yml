services:
  db:
    image: postgres:16
    container_name: vent3-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: vent3
      POSTGRES_PASSWORD: vent3dev
      POSTGRES_DB: vent3_db
    volumes:
      - vent3_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vent3"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  vent3_pg_data:
